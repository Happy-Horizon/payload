image: node:16-alpine

definitions:
  steps:
    - step: &SetupNode
        name: Setup Node
        caches:
          - node
          - pnpm
        script:
          - apk add --no-cache git python3 make g++
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile

    - step: &RunBuild
        name: Run Build
        caches:
          - node
          - pnpm
          - turbo
        script:
          - apk add --no-cache git python3 make g++
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile
          - pnpm run build

    - step: &RunLint
        name: Run Lint
        caches:
          - node
          - pnpm
          - turbo
        script:
          - apk add --no-cache git python3 make g++
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile
          - pnpm run lint

  caches:
    node: node_modules
    pnpm: ~/.pnpm-store
    turbo: .turbo

pipelines:
  default:
    - step: *SetupNode
    - step: *RunBuild
    - step: *RunLint
