image: node:16-alpine

definitions:
  steps:
    - step: &SetupNode
        name: Setup Node
        caches:
          - pnpm
          - turbo
        script:
          - apk add --no-cache git
          - npm install -g pnpm@9.7.1
          - pnpm install --frozen-lockfile

    - step: &RunBuild
        name: Build
        caches:
          - pnpm
          - turbo
        script:
          - pnpm run build

    - step: &RunLint
        name: Lint
        caches:
          - pnpm
          - turbo
        script:
          - pnpm run lint

  caches:
    pnpm: ~/.pnpm-store
    turbo: .turbo

pipelines:
  default:
    - step: *SetupNode
    - step: *RunBuild
    - step: *RunLint

  branches:
    main:
      - step: *SetupNode
      - step: *RunBuild
      - step: *RunLint
